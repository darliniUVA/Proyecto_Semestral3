name: Pipeline CI/CD - Despliegue Automatizado (EP2)

on:
  push:
    branches:
      - deploy  # Se ejecuta estrictamente al hacer push a la rama deploy según la pauta

jobs:
  # ==========================================
  # 1. BASE DE DATOS
  # ==========================================
  deploy-database:
    runs-on: ubuntu-latest
    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Crítico para cuentas de estudiantes
          aws-region: us-east-1

      - name: Asegurar Persistencia de Base de Datos en EC2
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${{ secrets.EC2_DB_INSTANCE_ID }}" \
            --parameters '{"commands":["if [ ! \"$(sudo docker ps -q -f name=tienda-db)\" ]; then if [ \"$(sudo docker ps -aq -f name=tienda-db)\" ]; then sudo docker start tienda-db; else sudo docker run -d --name tienda-db -p 3306:3306 -e MYSQL_ROOT_PASSWORD=admin123 -e MYSQL_DATABASE=tienda_despachos -v dbdata:/var/lib/mysql --restart always mysql:8; fi; fi"]}' \
            --region us-east-1

  # ==========================================
  # 2. BACKENDS (despachos + ventas en un solo job)
  # NOTA: Ambos backends van al MISMO EC2. Si se despliegan
  # en jobs paralelos, los comandos SSM llegan simultáneamente
  # y el demonio Docker colapsa (race condition). Un solo job
  # garantiza que los docker run se ejecuten de forma secuencial.
  # ==========================================
  deploy-backends:
    runs-on: ubuntu-latest
    needs: deploy-database
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push Backend Despachos
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/back-despachos:latest "./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO"
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/back-despachos:latest

      - name: Build y Push Backend Ventas
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/back-ventas:latest "./back-Ventas_SpringBoot/Springboot-API-REST"
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/back-ventas:latest

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # Se envía un único comando SSM con todos los pasos en orden.
      # --restart on-failure:5 permite que Spring Boot reintente
      # conectarse a MySQL si tarda unos segundos en aceptar conexiones.
      - name: Deploy Backends via SSM (secuencial)
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${{ secrets.EC2_BACKEND_INSTANCE_ID }}" \
            --parameters '{"commands":[
              "sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/back-despachos:latest",
              "sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/back-ventas:latest",
              "sudo docker stop tienda-back-despachos || true",
              "sudo docker rm   tienda-back-despachos || true",
              "sudo docker stop tienda-back-ventas || true",
              "sudo docker rm   tienda-back-ventas || true",
              "sudo docker run -d --name tienda-back-despachos --restart on-failure:5 -p 8082:8082 -e DB_ENDPOINT=${{ secrets.DB_INSTANCE_IP }} -e DB_PORT=3306 -e DB_USER=root -e DB_PASSWORD=admin123 ${{ secrets.DOCKERHUB_USERNAME }}/back-despachos:latest",
              "sudo docker run -d --name tienda-back-ventas    --restart on-failure:5 -p 8081:8081 -e DB_ENDPOINT=${{ secrets.DB_INSTANCE_IP }} -e DB_PORT=3306 -e DB_USER=root -e DB_PASSWORD=admin123 ${{ secrets.DOCKERHUB_USERNAME }}/back-ventas:latest"
            ]}' \
            --region us-east-1

  # ==========================================
  # 3. FRONTEND
  # ==========================================
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backends
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/front-frontend:latest "./front_despacho"
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/front-frontend:latest

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy Frontend via SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${{ secrets.EC2_FRONTEND_INSTANCE_ID }}" \
            --parameters '{"commands":["sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/front-frontend:latest","sudo docker stop tienda-front-frontend || true","sudo docker rm tienda-front-frontend || true","sudo docker run -d --name tienda-front-frontend -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/front-frontend:latest"]}' \
            --region us-east-1