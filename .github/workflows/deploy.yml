name: Pipeline CI/CD - Despliegue Automatizado (EP2)

on:
  push:
    branches:
      - deploy  # Se ejecuta estrictamente al hacer push a la rama deploy según la pauta

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    # ----------------------------------------------------------------
    # FASE 1: AUTENTICACIÓN Y CONSTRUCCIÓN (CI)
    # ----------------------------------------------------------------
    - name: Iniciar sesión en Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Construir y Subir Imágenes a Docker Hub
      run: |
        # Build de cada capa usando las rutas reales de tu repositorio
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/front-frontend:latest "./front_despacho"
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/back-ventas:latest "./back-Ventas_SpringBoot/Springboot-API-REST"
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/back-despachos:latest "./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO"
        
        # Publicación en el registro
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/front-frontend:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/back-ventas:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/back-despachos:latest

    # ----------------------------------------------------------------
    # FASE 2: CONFIGURACIÓN DE AWS ACADEMY
    # ----------------------------------------------------------------
    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Crítico para cuentas de estudiantes
        aws-region: us-east-1

    # ----------------------------------------------------------------
    # FASE 3: DESPLIEGUE AUTOMATIZADO VÍA AWS CLI SSM (CD)
    # ----------------------------------------------------------------
    
    # ----------------------------------------------------------------
    # DEBUG DE SECRETS
    # ----------------------------------------------------------------
    - name: Verificar Instance IDs
      run: |
         echo "FRONTEND=${{ secrets.EC2_FRONTEND_INSTANCE_ID }}"
         echo "BACKEND=${{ secrets.EC2_BACKEND_INSTANCE_ID }}"
         echo "DB=${{ secrets.EC2_DB_INSTANCE_ID }}"

    
    - name: Desplegar Frontend en EC2
      run: |
        aws ssm send-command \
          --document-name "AWS-RunShellScript" \
          --instance-ids "${{ secrets.EC2_FRONTEND_INSTANCE_ID }}" \
          --parameters '{"commands":["sudo docker stop tienda-front_despacho || true","sudo docker rm tienda-front_despacho || true","sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tienda-front_despacho:latest","sudo docker run -d --name tienda-front_despacho -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/tienda-front_despacho:latest"]}' \
          --region us-east-1

    - name: Desplegar Backends en EC2
      run: |
        aws ssm send-command \
          --document-name "AWS-RunShellScript" \
          --instance-ids "${{ secrets.EC2_BACKEND_INSTANCE_ID }}" \
          --parameters '{"commands":["sudo docker stop tienda-back-ventas tienda-back-despachos || true","sudo docker rm tienda-back-ventas tienda-back-despachos || true","sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/back-ventas:latest","sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/back-despachos:latest","sudo docker run -d --name tienda-back-ventas -p 8081:8081 -e DB_HOST=${{ secrets.DB_INSTANCE_IP }} -e DB_USER=root -e DB_PASSWORD=admin123 ${{ secrets.DOCKERHUB_USERNAME }}/back-ventas:latest","sudo docker run -d --name tienda-back-despachos -p 8082:8082 -e DB_HOST=${{ secrets.DB_INSTANCE_IP }} -e DB_USER=root -e DB_PASSWORD=admin123 ${{ secrets.DOCKERHUB_USERNAME }}/back-despachos:latest"]}' \
          --region us-east-1

    - name: Asegurar Persistencia de Base de Datos en EC2
      run: |
        aws ssm send-command \
          --document-name "AWS-RunShellScript" \
          --instance-ids "${{ secrets.EC2_DB_INSTANCE_ID }}" \
          --parameters '{"commands":["if [ ! \"$(sudo docker ps -q -f name=tienda-db)\" ]; then if [ \"$(sudo docker ps -aq -f name=tienda-db)\" ]; then sudo docker start tienda-db; else sudo docker run -d --name tienda-db -p 3306:3306 -e MYSQL_ROOT_PASSWORD=admin123 -e MYSQL_DATABASE=tienda_despachos -v dbdata:/var/lib/mysql --restart always mysql:8; fi; fi"]}' \
          --region us-east-1