name: Pipeline CI/CD - Despliegue Automatizado (EP2)

on:
  push:
    branches:
      - deploy  # Se ejecuta estrictamente al hacer push a la rama deploy según la pauta

jobs:
  # ==========================================
  # 1. BASE DE DATOS
  # ==========================================
  deploy-database:
    runs-on: ubuntu-latest
    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Crítico para cuentas de estudiantes
          aws-region: us-east-1

      # MySQL crea user_duoc automáticamente con MYSQL_USER/MYSQL_PASSWORD
      # solo en la primera inicialización. El CREATE USER IF NOT EXISTS
      # garantiza que exista incluso si el volumen ya tenía datos previos.
      - name: Asegurar Persistencia de Base de Datos y Usuario en EC2
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${{ secrets.AWS_EC2_DATA_ID }}" \
            --parameters '{"commands":[
              "if [ ! \"$(sudo docker ps -q -f name=db_proyecto)\" ]; then if [ \"$(sudo docker ps -aq -f name=db_proyecto)\" ]; then sudo docker start db_proyecto; else sudo docker run -d --name db_proyecto -p 3306:3306 -e MYSQL_ROOT_PASSWORD=password_root -e MYSQL_USER=user_duoc -e MYSQL_PASSWORD=password_duoc -e MYSQL_DATABASE=db_despacho_ventas -v mysql_data:/var/lib/mysql --restart always mysql:8.0; fi; fi",
              "echo Esperando que MySQL acepte conexiones...",
              "sleep 20",
              "sudo docker exec db_proyecto mysql -uroot -ppassword_root -e \"CREATE USER IF NOT EXISTS '"'"'user_duoc'"'"'@'"'"'%'"'"' IDENTIFIED BY '"'"'password_duoc'"'"'; GRANT ALL PRIVILEGES ON db_despacho_ventas.* TO '"'"'user_duoc'"'"'@'"'"'%'"'"'; FLUSH PRIVILEGES;\""
            ]}' \
            --region us-east-1

  # ==========================================
  # 2. BACKENDS (despachos + ventas en un solo job)
  # NOTA: Ambos backends van al MISMO EC2. Si se despliegan
  # en jobs paralelos, los comandos SSM llegan simultáneamente
  # y el demonio Docker colapsa (race condition). Un solo job
  # garantiza que los docker run se ejecuten de forma secuencial.
  # ==========================================
  deploy-backends:
    runs-on: ubuntu-latest
    needs: deploy-database
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push Backend Despachos
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest \
            -f "./proyecto semestral/back-Despachos_SpringBoot/Dockerfile" \
            "./proyecto semestral/back-Despachos_SpringBoot"
          docker push ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest

      - name: Build y Push Backend Ventas
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest \
            -f "./proyecto semestral/back-Ventas_SpringBoot/Dockerfile" \
            "./proyecto semestral/back-Ventas_SpringBoot"
          docker push ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # Se envía un único comando SSM con todos los pasos en orden.
      # --restart on-failure:5 permite que Spring Boot reintente
      # conectarse a MySQL si tarda unos segundos en aceptar conexiones.
      - name: Deploy Backends via SSM (secuencial)
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${{ secrets.AWS_EC2_BACKEND_ID }}" \
            --parameters '{"commands":[
              "sudo docker pull ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest",
              "sudo docker pull ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest",
              "sudo docker stop api_despachos || true",
              "sudo docker rm   api_despachos || true",
              "sudo docker stop api_ventas || true",
              "sudo docker rm   api_ventas || true",
              "sudo docker run -d --name api_despachos --restart on-failure:5 -p 8081:8081 -e SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.DB_EC2_IP }}:3306/db_despacho_ventas -e SPRING_DATASOURCE_USERNAME=user_duoc -e SPRING_DATASOURCE_PASSWORD=password_duoc ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest",
              "sudo docker run -d --name api_ventas    --restart on-failure:5 -p 8080:8080 -e SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.DB_EC2_IP }}:3306/db_despacho_ventas -e SPRING_DATASOURCE_USERNAME=user_duoc -e SPRING_DATASOURCE_PASSWORD=password_duoc ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest"
            ]}' \
            --region us-east-1

  # ==========================================
  # 3. FRONTEND
  # ==========================================
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backends
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest \
            -f "./proyecto semestral/front_despacho/Dockerfile" \
            "./proyecto semestral/front_despacho"
          docker push ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy Frontend via SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${{ secrets.AWS_EC2_FRONTEND_ID }}" \
            --parameters '{"commands":[
              "sudo docker pull ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest",
              "sudo docker stop front_despacho || true",
              "sudo docker rm   front_despacho || true",
              "sudo docker run -d --name front_despacho -p 80:80 ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest"
            ]}' \
            --region us-east-1