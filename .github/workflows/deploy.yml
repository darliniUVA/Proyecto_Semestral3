name: CI/CD Pipeline Semestral

on:
  push:
    branches:
      - deploy

jobs:
  # ==========================================
  # 1. BASE DE DATOS
  # ==========================================
  deploy-database:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy Database via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{secrets.AWS_EC2_DATA_ID}}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo docker pull mysql:8.0","sudo docker stop db_proyecto || true","sudo docker rm db_proyecto || true","sudo docker run -d --name db_proyecto -p 3306:3306 -e MYSQL_ROOT_PASSWORD=password_root -e MYSQL_DATABASE=db_despacho_ventas -v mysql_data:/var/lib/mysql mysql:8.0"]}' \
            --region us-east-1

  # ==========================================
  # 2. BACKEND DESPACHOS
  # ==========================================
  deploy-backend-despachos:
    runs-on: ubuntu-latest
    needs: deploy-database
    steps:
      - name: Descargar Código
        uses: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push Backend Despachos
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest -f "./proyecto semestral/back-Despachos_SpringBoot/Dockerfile" "./proyecto semestral/back-Despachos_SpringBoot"
          docker push ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy Backend Despachos via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{secrets.AWS_EC2_BACKEND_ID}}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo docker pull ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest","sudo docker stop api_despachos || true","sudo docker rm api_despachos || true","sudo docker run -d --name api_despachos -p 8081:8081 -e SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.DB_EC2_IP}}:3306/db_despacho_ventas -e SPRING_DATASOURCE_USERNAME=root -e SPRING_DATASOURCE_PASSWORD=password_duoc ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest"]}' \
            --region us-east-1

  # ==========================================
  # 3. BACKEND VENTAS
  # ==========================================
  deploy-backend-ventas:
    runs-on: ubuntu-latest
    needs: deploy-database
    steps:
      - name: Descargar Código
        uses: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push Backend Ventas
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest -f "./proyecto semestral/back-Ventas_SpringBoot/Dockerfile" "./proyecto semestral/back-Ventas_SpringBoot"
          docker push ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy Backend Ventas via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{secrets.AWS_EC2_BACKEND_ID}}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo docker pull ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest","sudo docker stop api_ventas || true","sudo docker rm api_ventas || true","sudo docker run -d --name api_ventas -p 8080:8080 -e SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.DB_EC2_IP}}:3306/db_despacho_ventas -e SPRING_DATASOURCE_USERNAME=root -e SPRING_DATASOURCE_PASSWORD=password_duoc ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest"]}' \
            --region us-east-1

  # ==========================================
  # 4. FRONTEND
  # ==========================================
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [deploy-backend-despachos, deploy-backend-ventas]
    steps:
      - name: Descargar Código
        uses: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest -f "./proyecto semestral/front_despacho/Dockerfile" "./proyecto semestral/front_despacho"
          docker push ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy Frontend via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{secrets.AWS_EC2_FRONTEND_ID}}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo docker pull ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest","sudo docker stop front_despacho || true","sudo docker rm front_despacho || true","sudo docker run -d --name front_despacho -p 80:80 ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest"]}' \
            --region us-east-1