apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: tienda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-container
        # Asegúrate de poner el nombre exacto de tu imagen de front en Docker Hub aquí:
        image: darlinimiel/front-despacho:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: tienda
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80