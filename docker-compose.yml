version: "3.8"

services:
  # 1. BASE DE DATOS (MySQL para los Microservicios)
  base-datos:
    image: mysql:8.0
    container_name: db_proyecto
    environment:
      MYSQL_ROOT_PASSWORD: password_duoc
      MYSQL_DATABASE: db_despacho_ventas
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - red_devops

  # 2. BACKEND: VENTAS (Java Spring Boot)
  back-ventas:
    build: ./proyecto semestral/back-Ventas_SpringBoot
    container_name: api_ventas
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://base-datos:3306/db_despacho_ventas
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password_duoc
    depends_on:
      - base-datos
    networks:
      - red_devops

  # 3. BACKEND: DESPACHOS (Java Spring Boot)
  back-despachos:
    build: ./proyecto semestral/back-Despachos_SpringBoot
    container_name: api_despachos
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://base-datos:3306/db_despacho_ventas
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password_duoc
    depends_on:
      - base-datos
    networks:
      - red_devops

  # 4. FRONTEND (Nginx sirviendo la App de Despacho)
  frontend:
    build: ./proyecto semestral/front_despacho
    container_name: app_frontend
    ports:
      - "80:80"
    depends_on:
      - back-ventas
      - back-despachos
    networks:
      - red_devops

volumes:
  mysql_data:

networks:
  red_devops:
    driver: bridge